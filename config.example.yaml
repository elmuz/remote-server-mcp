# Remote Server MCP Configuration
# Copy this file to config.yaml and update with your server details

ssh:
  # Server connection details
  host: "your-server.example.com"
  port: 22
  username: "your-username"
  
  # Authentication: choose ONE of the following
  # Option 1: Password authentication (less secure)
  # password: "your-password"
  
  # Option 2: SSH key authentication (recommended)
  key_path: "~/.ssh/id_rsa"

security:
  # Service directory base path - all operations restricted to this path
  services_path: "/srv"

  # NEVER allow generic command execution (recommended: false)
  # If set to true, DANGEROUS - only enable if you absolutely must
  allow_generic_commands: false

# Database query configuration (optional)
# These sections enable read-only HTTP API queries against InfluxDB v3 and Prometheus
# Credentials are optional - leave commented if no auth is required

influxdb:
  # enabled: false  # Set to true to enable InfluxDB query tools
  # host: "localhost"
  # port: 8181  # Default InfluxDB v3 port
  # use_https: false
  # database: "mydb"  # Default database for queries
  # token: "your-api-token"  # Optional: read-only API token
  # query_limit: 1000  # Maximum rows returned per query (safety limit)

prometheus:
  # enabled: false  # Set to true to enable Prometheus query tools
  # host: "localhost"
  # port: 9090  # Default Prometheus port
  # use_https: false
  # token: "your-bearer-token"  # Optional: read-only bearer token
  # query_timeout: "30s"  # Query timeout parameter
